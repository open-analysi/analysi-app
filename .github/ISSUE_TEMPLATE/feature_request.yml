name: Feature request
description: Propose a new capability or enhancement
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Before opening a feature request,
        please check existing [issues](../../issues) and
        [discussions](../../discussions) to see if it has already been raised.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who is affected?
      placeholder: As a SOC analyst triaging phishing alerts, I cannot ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change you'd like. Include API shape, UX, or config sketches if relevant.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about and why you ruled them out.

  - type: dropdown
    id: scope
    attributes:
      label: Area
      multiple: true
      options:
        - API / backend
        - CLI
        - Workflows / Tasks
        - Integrations
        - Web UI
        - Docs
        - Deployment / Helm / Kind
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, prior art, screenshots, or anything else useful.

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues and discussions for this idea.
          required: true
        - label: I have read the [Code of Conduct](../../CODE_OF_CONDUCT.md).
          required: true
