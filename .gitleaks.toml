# Gitleaks configuration — extends the built-in ruleset.
# See: https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

[allowlist]
description = "Test fixtures, vendor doc examples, UI mock data, and known false positives"
paths = [
    # Unit and integration test fixtures use values like "test-api-key-12345"
    # and hand-crafted fake RSA keys. Real credentials never live here.
    '''tests/''',
    # Legacy phase planning docs (docs/planning/legacy/) reference placeholder
    # values like "YOUR_API_KEY" and "dev-root-token" in curl examples.
    '''docs/planning/legacy/''',
    # Per-integration vendor README files include credential-shape examples
    # (Google service-account JSON, "api_key": "0123456789abcdef...", etc.)
    # to show users what to paste into the credentials form.
    '''src/analysi/integrations/framework/integrations/[^/]+/README\.md$''',
    # UI fixtures: faker-generated names get flagged as high-entropy strings,
    # and mock alert artifacts include fake URLs with mock query tokens.
    '''^ui/mocks/data/''',
    '''^ui/src/data/staticMockData\.ts$''',
    # .env.example documents variable names with empty values; gitleaks'
    # generic-api-key rule occasionally matches across line boundaries.
    '''^\.env\.example$''',
]

# False positives from the generic-api-key rule. These are not secrets — gitleaks
# flags them because the surrounding text has high entropy or matches a heuristic.
# Each regex must match the line content (or surrounding context) of the false hit.
regexes = [
    # 'raise_exceptions=True' — gitleaks generic-api-key matches the surrounding
    # 'password=password,' kwargs in src/analysi/integrations/framework/integrations/ad_ldap/actions.py
    # and reports raise_exceptions=True as the "secret". Not a credential.
    '''raise_exceptions=True''',
]
