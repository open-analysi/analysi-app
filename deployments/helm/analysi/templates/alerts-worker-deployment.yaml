{{- $component := "alerts-worker" -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "analysi.componentName" (dict "Release" .Release "Chart" .Chart "component" $component) }}
  labels:
    {{- include "analysi.labels" (dict "Root" . "layer" "core") | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  replicas: {{ .Values.alertsWorker.replicaCount }}
  selector:
    matchLabels:
      {{- include "analysi.selectorLabels" (dict "Chart" .Chart "Release" .Release "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "analysi.selectorLabels" (dict "Chart" .Chart "Release" .Release "component" $component) | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.alertsWorker.initContainers.waitForDb }}
      initContainers:
        - name: wait-for-db
          image: "{{ .Values.global.utilityImage.repository }}:{{ .Values.global.utilityImage.tag }}"
          command: ['sh', '-c', 'until nc -z {{ .Values.global.database.host }} {{ .Values.global.database.port }}; do sleep 2; done']
      {{- end }}
      containers:
        - name: alerts-worker
          image: "{{ .Values.global.image.repository }}:{{ .Values.global.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          command: ["poetry", "run", "arq", "analysi.alert_analysis.worker.WorkerSettings", "--verbose"]
          env:
            {{- include "analysi.commonEnv" . | nindent 12 }}
            - name: REDIS_DB
              value: {{ .Values.alertsWorker.redisDb | quote }}
            - name: ALERT_WORKER_PROCESSES
              value: {{ .Values.alertsWorker.processes | quote }}
            - name: ALERT_WORKER_MAX_JOBS
              value: {{ .Values.alertsWorker.maxJobs | quote }}
            - name: ALERT_WORKER_TIMEOUT
              value: {{ .Values.alertsWorker.timeout | quote }}
            - name: ARTIFACTS_BUCKET
              value: {{ .Values.global.minio.artifactsBucket | quote }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.alertsWorker.resources | nindent 12 }}
      volumes:
        - name: tmp
          emptyDir: {}
