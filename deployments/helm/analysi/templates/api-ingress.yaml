{{- if .Values.api.ingress.enabled -}}
{{- $component := "api" -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "analysi.componentName" (dict "Release" .Release "Chart" .Chart "component" $component) }}
  labels:
    {{- include "analysi.labels" (dict "Root" . "layer" "core") | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
  {{- with .Values.api.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.api.ingress.className }}
  ingressClassName: {{ .Values.api.ingress.className }}
  {{- end }}
  rules:
    {{- range .Values.api.ingress.hosts }}
    - {{- if .host }}
      host: {{ .host | quote }}
      {{- end }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "analysi.componentName" (dict "Release" $.Release "Chart" $.Chart "component" $component) }}
                port:
                  name: http
          {{- end }}
    {{- end }}
  {{- if .Values.api.ingress.tls }}
  tls:
    {{- toYaml .Values.api.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
