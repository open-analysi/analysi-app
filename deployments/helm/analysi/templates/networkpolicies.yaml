          port: 9000
{{- end }}

{{- if .Values.vault.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "analysi.fullname" . }}-vault
  labels:
    {{- include "analysi.labels" (dict "Root" . "layer" "deps") | nindent 4 }}
