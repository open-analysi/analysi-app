{{- $component := "api" -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "analysi.componentName" (dict "Release" .Release "Chart" .Chart "component" $component) }}
  labels:
    {{- include "analysi.labels" (dict "Root" . "layer" "core") | nindent 4 }}
    app.kubernetes.io/component: {{ $component }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if .Values.api.service.nodePort }}
      nodePort: {{ .Values.api.service.nodePort }}
      {{- end }}
  selector:
    {{- include "analysi.selectorLabels" (dict "Chart" .Chart "Release" .Release "component" $component) | nindent 4 }}
