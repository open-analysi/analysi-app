apiVersion: v1
kind: Secret
metadata:
  name: {{ include "analysi.fullname" . }}-secrets
  labels:
    {{- include "analysi.labels" (dict "Root" . "layer" "core") | nindent 4 }}
type: Opaque
stringData:
  database-url: {{ include "analysi.databaseUrl" . | quote }}
  # `required` causes helm install/template to fail fast with a clear message
  # if the operator forgot to supply credentials. No insecure defaults.
  database-password: {{ required "global.database.password is required (no default)" .Values.global.database.password | quote }}
  valkey-password: {{ required "global.valkey.password is required (no default)" .Values.global.valkey.password | quote }}
  minio-access-key: {{ required "global.minio.accessKey is required (no default)" .Values.global.minio.accessKey | quote }}
  minio-secret-key: {{ required "global.minio.secretKey is required (no default)" .Values.global.minio.secretKey | quote }}
  vault-token: {{ required "global.vault.token is required (no default)" .Values.global.vault.token | quote }}
  system-api-key: {{ required "global.auth.systemApiKey is required (no default)" .Values.global.auth.systemApiKey | quote }}
  # Dependency service credentials — DERIVED from the same `global.*` values
  # above so that app pods and dep pods are guaranteed to agree. Operators
  # configure each credential in ONE place (global.*) and both sides receive
  # the same secret material. The {X}.auth.password fields in values.yaml
  # are deprecated and ignored at runtime.
  {{- if .Values.postgresql.enabled }}
  postgresql-password: {{ .Values.global.database.password | quote }}
  {{- end }}
  {{- if .Values.minio.enabled }}
  minio-root-user: {{ .Values.global.minio.accessKey | quote }}
  minio-root-password: {{ .Values.global.minio.secretKey | quote }}
  {{- end }}
  {{- if .Values.vault.enabled }}
  vault-dev-token: {{ .Values.global.vault.token | quote }}
  {{- end }}
  {{- if .Values.global.auth.adminApiKey }}
  admin-api-key: {{ .Values.global.auth.adminApiKey | quote }}
  {{- end }}
  {{- if .Values.global.auth.ownerApiKey }}
  owner-api-key: {{ .Values.global.auth.ownerApiKey | quote }}
  {{- end }}
