# kind cluster configuration for local Analysi development
# Maps container NodePorts to host ports for local access
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30080
        hostPort: 8000
        protocol: TCP
      - containerPort: 30173
        hostPort: 5173
        protocol: TCP
