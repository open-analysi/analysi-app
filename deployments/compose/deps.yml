# Layer 2: Core Dependencies
# Backing services required by the product layer. Implementations vary by environment:
# local dev uses containers, cloud deployments swap in managed services (RDS, S3, etc.).
#
# Always used together with core.yml:
#   docker compose -f core.yml -f deps.yml up

name: analysi

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "100m"
    max-file: "3"

services:
  postgres:
    logging: *default-logging
    build:
      context: ../docker/postgres
      args:
        PG_MAJOR: "15"
    image: analysi-postgres:15-partman
    env_file: ../../.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD}
    ports:
      - "${POSTGRES_EXTERNAL_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../docker/configs/postgres/init:/docker-entrypoint-initdb.d
      - ../docker/configs/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d analysi_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'

  keycloak:
    logging: *default-logging
    image: quay.io/keycloak/keycloak:26.1
    env_file: ../../.env
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
      KC_DB: dev-mem
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: "http://localhost:8080"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "${KEYCLOAK_EXTERNAL_PORT:-8080}:8080"
    volumes:
      - ../docker/configs/keycloak/realm-analysi.json:/opt/keycloak/data/import/realm-analysi.json:ro
      - ../docker/configs/keycloak/themes/analysi:/opt/keycloak/themes/analysi:ro
    command: ["start-dev", "--import-realm", "--metrics-enabled=true"]
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080 && printf \"GET /realms/analysi HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -1 <&3 | grep -q 200'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - app

  minio:
    logging: *default-logging
    image: minio/minio:latest
    env_file: ../../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_EXTERNAL_PORT}:9000"
      - "${MINIO_CONSOLE_EXTERNAL_PORT}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - app

  minio-init:
    logging: *default-logging
    image: minio/mc:latest
    env_file: ../../.env
    volumes:
      - ../docker/configs/minio/init:/scripts
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - app
    entrypoint: ["/bin/sh", "-c"]
    command: ["chmod +x /scripts/create-buckets.sh && /scripts/create-buckets.sh"]

  valkey:
    logging: *default-logging
    image: valkey/valkey:8-alpine
    env_file: ../../.env
    ports:
      - "${VALKEY_EXTERNAL_PORT}:6379"
    volumes:
      - valkey_data:/data
      - ../docker/configs/valkey/valkey.conf:/usr/local/etc/valkey/valkey.conf:ro
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "${VALKEY_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - app
    command: valkey-server /usr/local/etc/valkey/valkey.conf --requirepass ${VALKEY_PASSWORD}

  vault:
    logging: *default-logging
    image: hashicorp/vault:latest
    env_file: ../../.env
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_DEV_ROOT_TOKEN:-dev-root-token}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
      VAULT_LOG_LEVEL: ${VAULT_LOG_LEVEL:-info}
      VAULT_ADDR: http://127.0.0.1:8200
      VAULT_TELEMETRY_UNAUTHENTICATED_METRICS_ACCESS: "true"
    ports:
      - "${VAULT_EXTERNAL_PORT:-8200}:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - vault_data:/vault/data
      - ../docker/configs/vault/config:/vault/config:ro
      - ../docker/configs/vault/scripts:/vault/scripts:ro
    command: ["/bin/sh", "/vault/scripts/docker-entrypoint-wrapper.sh"]
    restart: unless-stopped
    networks:
      - app

networks:
  app:
    name: analysi-net
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  valkey_data:
  vault_data:
  keycloak_data:
