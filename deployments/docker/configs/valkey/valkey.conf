# Valkey Configuration for Analysi
# This configuration supports both production and testing databases

# Number of databases - supports production (0-99) and testing (100+)
databases 256

# Persistence configuration
appendonly yes
appendfsync everysec

# RDB snapshots
save 900 1
save 300 10
save 60 10000

# Log level
loglevel notice

# Max memory policy
maxmemory-policy allkeys-lru

# Password is set via --requirepass CLI flag in docker-compose.yaml
# so it can read from the VALKEY_PASSWORD env var.

# Disable protected mode for Docker networking (requirepass handles auth)
protected-mode no

# Bind to all interfaces (Docker internal)
bind 0.0.0.0

# Default port
port 6379
