# PostgreSQL Configuration for Development
# Tuned for ~2GB RAM allocation in Docker
# Reference: https://pgtune.leopard.in.ua/

# MEMORY SETTINGS
# ---------------
# 25% of available RAM for shared buffers
shared_buffers = 512MB

# Memory per operation (sorts, hashes, joins)
# Higher = faster complex queries, but multiplied by max_connections
work_mem = 32MB

# Memory for maintenance operations (VACUUM, CREATE INDEX)
maintenance_work_mem = 256MB

# Query planner hint: total memory available for caching
# ~75% of RAM available to PostgreSQL
effective_cache_size = 1536MB

# WRITE PERFORMANCE
# -----------------
# WAL buffers for write performance
wal_buffers = 16MB

# Spread checkpoint writes over more time (reduces I/O spikes)
checkpoint_completion_target = 0.9

# SSD OPTIMIZATIONS (Mac uses SSD)
# --------------------------------
# Lower random read cost for SSDs (default 4.0 is for spinning disks)
random_page_cost = 1.1

# Concurrent I/O operations (SSDs can handle many)
effective_io_concurrency = 200

# EXTENSIONS
# ----------
# pg_cron: Primary scheduler for partition maintenance (hourly, configured in V094)
# pg_partman_bgw: Safety-net background worker (defense-in-depth, runs independently)
shared_preload_libraries = 'pg_partman_bgw, pg_cron'

# pg_cron runs jobs in this database by default
cron.database_name = 'analysi_db'

# Both call run_maintenance_proc() which is idempotent — double execution is harmless.
# pg_partman BGW safety net: checks every 30 minutes
pg_partman_bgw.interval = 1800
pg_partman_bgw.dbname = 'analysi_db'
pg_partman_bgw.role = 'dev'

# LOCK TABLE
# ----------
# Default is 64, far too low for pg_partman workloads.
# We have 10+ partitioned tables with premake=30 (300+ partitions).
# A query joining 3 partitioned tables needs locks on each partition.
# 256 safely covers: 3 tables × 30 partitions + system overhead.
max_locks_per_transaction = 256

# CONNECTIONS
# -----------
# Listen on all interfaces (required for container networking)
listen_addresses = '*'
max_connections = 100

# LOGGING (useful for dev)
# ------------------------
log_min_duration_statement = 500
log_lock_waits = on
log_temp_files = 0
