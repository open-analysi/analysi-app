global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 30s
    metrics_path: /metrics

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['host.docker.internal:9100']
    scrape_interval: 15s
    metrics_path: /metrics

  - job_name: 'thermal-exporter'
    static_configs:
      - targets: ['host.docker.internal:9101']
    scrape_interval: 15s
    metrics_path: /metrics

  - job_name: 'api'
    static_configs:
      - targets: ['api:8000']
    scrape_interval: 15s
    metrics_path: /metrics

  - job_name: 'valkey-exporter'
    static_configs:
      - targets: ['valkey-exporter:9121']
    scrape_interval: 15s
    metrics_path: /metrics

  - job_name: 'keycloak'
    static_configs:
      - targets: ['keycloak:9000']
    scrape_interval: 30s
    metrics_path: /metrics

  - job_name: 'vault'
    static_configs:
      - targets: ['vault:8200']
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: /v1/sys/metrics
    params:
      format: ['prometheus']
    bearer_token: 'dev-root-token'
